# kiho plugin — user-editable defaults (template)
#
# This is the canonical default config. When `skills/core/harness/kiho/config.toml`
# is missing or damaged, kiho-setup regenerates it from this file.
#
# Keep this file in lockstep with the shipped config.toml header + keys. If a
# new key is added to config.toml, mirror it here with a safe default so the
# regeneration path stays complete.
#
# Format: TOML 1.0. See references/storage-tech-stack.md §1.

# ---- Required ----

# Where the company-level knowledge base lives. MUST be an absolute path.
# This path is user-global ("follows the user") and is NOT inside any
# specific project. Recommended defaults:
#   Windows: D:/Tools/kiho/
#   Unix:    ~/kiho/
# If empty or missing, kiho-setup will ask on first run.
company_root = ""

# ---- v4 thresholds ----

# Trigger memory-reflect for an agent every N completed tasks.
reflection_task_interval = 5

# CEO checks org health (recomposition) every N completed tasks.
recomposition_task_interval = 10

# Trigger reflection when observation importance sum exceeds this.
importance_threshold = 15

# Minimum capability matrix proficiency for RACI R (Responsible) assignment.
min_proficiency_for_assignment = 2

# CEO self-reflection cadence (v5). Every N /kiho turns runs CEO memory-reflect.
# Default 1 = every turn (max drift-detection fidelity).
ceo_turn_interval = 1

# ---- CEO autonomy thresholds ----

# CEO proceeds autonomously when confidence is >= this for reversible ops.
autonomy_threshold_reversible = 0.90

# CEO proceeds autonomously when confidence is >= this for irreversible ops,
# AND the operation class has been user-preapproved.
autonomy_threshold_irreversible = 0.95

# ---- Committee rules ----

# Maximum rounds a committee may run before escalating to CEO.
max_committee_rounds = 3

# Aggregate confidence required to close a committee without escalation.
# HARD FLOOR — see references/committee-rules.md; penalties that drop below
# this do NOT permit close, they force another round or escalation.
committee_no_doubt_confidence = 0.90

# ---- v6 recruit (gap-healing reflex; overridden by $COMPANY_ROOT/settings.md) ----
#
# Plugin-level fallbacks only. When $COMPANY_ROOT/settings.md exists, the
# `recruit:` block there wins key-by-key. See references/company-settings-schema.md.

[recruit]
# Auto-fire recruit when a capability gap is detected (RACI fail OR mid-wave).
# false = fall back to v5 behavior (ASK_USER on gap).
auto_trigger_on_gap = true

# Hard minimum candidates per recruit. v6 drops quick-hire/careful-hire split.
min_candidates_always = 4

# Rubric score required to close the hiring committee.
committee_gate_threshold = 4.0

# Synthesize top-2 when scores are close AND strengths non-overlapping.
synthesis_when_complementary = true
synthesis_rubric_delta_max = 0.20

# Populate hired agent's memory/ at Phase 6.
memory_seed_on_hire = true

# Runaway guard — more auto-recruits than this in a turn triggers user prompt.
max_auto_recruits_per_turn = 2

# Recruit Phase 2: research + author skills missing from the company library
# BEFORE Phase 3 candidate design.
skill_research_before_design = true

# Cap on new skills authored by one recruit; overflow → split into multiple.
max_skills_authored_per_recruit = 3

# ---- v6 skill library ----

[skill_library]
# Promote research to skills when referenced ≥ reuse_threshold_count times.
auto_consolidate_research = true
reuse_threshold_count = 2

# Consolidation cycle cadence — run consolidate-skill-library skill on
# whichever trigger fires first. 0 disables.
consolidate_cadence_days = 30
consolidate_cadence_new_skill_count = 5

# Skills with zero invocations in this many days AND no dependents are
# candidates for deprecation.
stale_days = 60

# ---- v6 KB consolidation ----

[kb_consolidation]
# consolidate-project-kb runs every N CEO turns per project.
project_kb_cadence_turns = 10
# consolidate-company-kb runs every M days OR after P cross-project turns.
company_kb_cadence_days = 30
company_kb_cadence_turns = 20

# ---- v6 startup ----

[startup]
# Read $COMPANY_ROOT/settings.md + company/wiki/index.md + skills/INDEX.md
# at every INITIALIZE. Disable only for debugging.
read_company_wiki_on_init = true
read_settings_on_init = true

# Warn when company KB files are stale.
warn_if_stale_days = 7

# Warn when an agent has `active_project = <this>` but mtime < project mtime.
warn_if_agent_mtime_older_than_project = true

# ---- v6 scope boundary (CEO DONE scope-promote sweep) ----

[promote]
# CEO DONE step 3 runs scope-promote-classifier against new files created
# this turn in .kiho/audit/** and .kiho/state/research/**.
auto_scope_classify_on_done = true

# Dry-run diff presented to user before any $COMPANY_ROOT write.
dry_run_before_write = true

# ---- v6 performance amplification ----

[performance]
# Rank existing skills in USE/IMPROVE/CREATE decision (Phase 2.3, Phase 3.5)
# via success_rate × (1 − correction_rate) × freshness.
rank_skills_by_performance = true

[performance.rank_weights]
# Must sum to 1.0. Used by design-agent to pick among competing skills.
success_rate = 0.5
inverse_correction_rate = 0.3
freshness = 0.2

# ---- v6 external skill referencing ----

[external_skills]
# Allow skills to reference other plugins' skills via the skill's `references:`
# frontmatter (e.g., onchainos:okx-dex-token, firecrawl:firecrawl).
allow_references = true

# TTL on the external-skills catalog cache at
# $COMPANY_ROOT/external-skills-catalog.json.
catalog_ttl_days = 7

# ---- v6 language & tone (propagates to committee, briefs, CEO narration) ----

[tone]
# Set to "zh-TW", "zh-CN", "ja", etc. at $COMPANY_ROOT/settings.md for live
# propagation. Plugin default = en for new installs with no company settings.
official_language_fallback = "en"
formality_fallback = "collaborative-formal"
emoji_in_agent_output_fallback = false

# ---- Ralph loop safety ----

# Hard cap on Ralph loop iterations per /kiho turn.
max_ralph_iterations = 200

# Stuck-detection timeout in minutes (no progress in ledger -> ASK_USER).
stuck_timeout_min = 10

# ---- Organization caps ----

# Hard limit on sub-agent spawn depth (CEO -> Dept -> Team/IC = 3).
depth_cap = 3

# Hard limit on sibling sub-agents per parent.
fanout_cap = 5

# ---- Evolution loop ----

# Max iterations for a single /kiho evolve invocation.
max_evolve_iterations = 20

# Minimum days between auto-deprecation sweeps for a skill
# (an ACTIVE skill unused for > this AND use_count < 3 is eligible).
skill_stale_days = 60

# ---- Storage-fit grace window (v5.19+) ----
v5_19_ship_date = "2026-04-18"

# ---- Research cascade ----

# Max wall-clock minutes any single research cascade step may consume.
[research_step_budget_min]
kb_search = 1
web = 3
deepwiki = 2
clone = 5
ask_user = 0  # no budget; user-driven

# ---- Budgets per /kiho turn ----
# Soft caps. CEO logs when exceeded but does not hard-stop unless the
# max_ralph_iterations cap is also reached.
[budget_per_turn]
tokens = 2_000_000
tool_calls = 500
wall_clock_min = 120

# ---- Memory decay (per-agent memory, not KB) ----
[memory_tau_days]
episodic = 14
semantic = 180
procedural = 365
reflective = 90
